databases:
  - name: english-learning-db
    plan: free
    databaseName: english_learning
    user: nha

services:
  - type: web
    name: vocabmaster
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: english-learning-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: NODE_VERSION
        value: "20"
